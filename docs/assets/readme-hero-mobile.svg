<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 430" role="img" aria-labelledby="title description">
  <title id="title">Komorebi Starter mobile interface schematic</title>
  <desc id="description">A compact tiling desktop schematic with numbered workspaces, a state-command-verify loop, and native transient-window handling.</desc>

  <rect width="480" height="430" fill="#0d1117"/>

  <rect x="1" y="1" width="478" height="42" fill="#161b22" stroke="#30363d"/>
  <g fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="14">
    <text x="18" y="28" fill="#f0f6fc">1</text>
    <text x="45" y="28">2</text>
    <text x="72" y="28">3</text>
    <text x="99" y="28">4</text>
    <text x="126" y="28">5</text>
    <text x="153" y="28">6</text>
    <text x="180" y="28">7</text>
    <text x="207" y="28">8</text>
    <text x="234" y="28">9</text>
  </g>
  <rect x="11" y="39" width="18" height="3" fill="#58a6ff"/>
  <g fill="none" stroke="#58a6ff" stroke-width="1.5">
    <rect x="278" y="13" width="6" height="6" rx="1"/>
    <rect x="288" y="13" width="6" height="6" rx="1"/>
    <rect x="278" y="23" width="6" height="6" rx="1"/>
    <rect x="288" y="23" width="6" height="6" rx="1"/>
  </g>
  <text x="306" y="28" fill="#f0f6fc" font-family="Segoe UI, Arial, sans-serif" font-size="14">Grid</text>
  <circle cx="405" cy="21" r="4" fill="#3fb950"/>
  <text x="419" y="27" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="13">READY</text>

  <rect x="12" y="62" width="456" height="236" rx="8" fill="#161b22" stroke="#30363d"/>
  <rect x="12" y="62" width="456" height="38" rx="8" fill="#1f242c"/>
  <path d="M12 92h456v8H12z" fill="#1f242c"/>
  <text x="34" y="86" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="13">CONTROL LOOP</text>

  <text x="34" y="143" fill="#f0f6fc" font-family="Consolas, monospace" font-size="16">STATE</text>
  <text x="148" y="143" fill="#8b949e" font-family="Consolas, monospace" font-size="16">wm state</text>
  <line x1="34" y1="160" x2="446" y2="160" stroke="#30363d"/>

  <text x="34" y="204" fill="#58a6ff" font-family="Consolas, monospace" font-size="16">COMMAND</text>
  <text x="148" y="204" fill="#f0f6fc" font-family="Consolas, monospace" font-size="16">wm focus right</text>
  <line x1="34" y1="221" x2="446" y2="221" stroke="#30363d"/>

  <text x="34" y="265" fill="#3fb950" font-family="Consolas, monospace" font-size="16">VERIFY</text>
  <text x="148" y="265" fill="#8b949e" font-family="Consolas, monospace" font-size="16">wm state</text>

  <rect x="12" y="318" width="456" height="98" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="34" y="348" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="12">WINDOW OWNERSHIP</text>
  <text x="34" y="384" fill="#f0f6fc" font-family="Consolas, monospace" font-size="14">MAIN</text>
  <text x="91" y="384" fill="#3fb950" font-family="Consolas, monospace" font-size="14">MANAGED</text>
  <text x="258" y="384" fill="#8b949e" font-family="Consolas, monospace" font-size="14">TRANSIENT</text>
  <text x="390" y="384" fill="#58a6ff" font-family="Consolas, monospace" font-size="14">NATIVE</text>
</svg>
