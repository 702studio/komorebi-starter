<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" role="img" aria-labelledby="title description">
  <title id="title">Komorebi Starter interface schematic</title>
  <desc id="description">A minimal Windows tiling desktop with numbered workspaces, a Grid layout, a state-command-verify terminal loop, an agent manifest, and native transient-window handling.</desc>

  <rect width="1000" height="360" fill="#0d1117"/>

  <rect x="1" y="1" width="998" height="40" fill="#161b22" stroke="#30363d"/>
  <g fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="14">
    <text x="18" y="27" fill="#f0f6fc">1</text>
    <text x="44" y="27">2</text>
    <text x="70" y="27">3</text>
    <text x="96" y="27">4</text>
    <text x="122" y="27">5</text>
    <text x="148" y="27">6</text>
    <text x="174" y="27">7</text>
    <text x="200" y="27">8</text>
    <text x="226" y="27">9</text>
  </g>
  <rect x="11" y="37" width="18" height="3" fill="#58a6ff"/>

  <g fill="none" stroke="#58a6ff" stroke-width="1.5">
    <rect x="261" y="13" width="6" height="6" rx="1"/>
    <rect x="271" y="13" width="6" height="6" rx="1"/>
    <rect x="261" y="23" width="6" height="6" rx="1"/>
    <rect x="271" y="23" width="6" height="6" rx="1"/>
  </g>
  <text x="289" y="27" fill="#f0f6fc" font-family="Segoe UI, Arial, sans-serif" font-size="14">Grid</text>
  <line x1="330" y1="11" x2="330" y2="31" stroke="#30363d"/>
  <text x="346" y="27" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="14">Windows Terminal</text>
  <circle cx="891" cy="21" r="4" fill="#3fb950"/>
  <text x="904" y="27" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="13">READY</text>
  <text x="964" y="27" fill="#f0f6fc" font-family="Segoe UI, Arial, sans-serif" font-size="13">11:45</text>

  <rect x="14" y="60" width="572" height="286" rx="8" fill="#161b22" stroke="#30363d"/>
  <rect x="14" y="60" width="572" height="38" rx="8" fill="#1f242c"/>
  <path d="M14 90h572v8H14z" fill="#1f242c"/>
  <text x="38" y="84" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="13">CONTROL LOOP</text>

  <text x="38" y="142" fill="#f0f6fc" font-family="Consolas, monospace" font-size="16">STATE</text>
  <text x="166" y="142" fill="#8b949e" font-family="Consolas, monospace" font-size="16">wm state</text>
  <line x1="38" y1="160" x2="562" y2="160" stroke="#30363d"/>

  <text x="38" y="204" fill="#58a6ff" font-family="Consolas, monospace" font-size="16">COMMAND</text>
  <text x="166" y="204" fill="#f0f6fc" font-family="Consolas, monospace" font-size="16">wm focus right</text>
  <line x1="38" y1="222" x2="562" y2="222" stroke="#30363d"/>

  <text x="38" y="266" fill="#3fb950" font-family="Consolas, monospace" font-size="16">VERIFY</text>
  <text x="166" y="266" fill="#8b949e" font-family="Consolas, monospace" font-size="16">wm state</text>
  <line x1="38" y1="284" x2="562" y2="284" stroke="#30363d"/>

  <text x="38" y="320" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="13">Observe first. Mutate once. Verify the Windows foreground.</text>

  <rect x="600" y="60" width="386" height="166" rx="8" fill="#161b22" stroke="#30363d"/>
  <rect x="600" y="60" width="386" height="38" rx="8" fill="#1f242c"/>
  <path d="M600 90h386v8H600z" fill="#1f242c"/>
  <text x="624" y="84" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="13">AGENT MANIFEST</text>
  <g font-family="Consolas, monospace" font-size="13">
    <text x="624" y="130" fill="#8b949e">"io"</text>
    <text x="726" y="130" fill="#f0f6fc">:</text>
    <text x="745" y="130" fill="#3fb950">"-Json"</text>
    <text x="624" y="162" fill="#8b949e">"verify"</text>
    <text x="726" y="162" fill="#f0f6fc">:</text>
    <text x="745" y="162" fill="#58a6ff">"state-command-state"</text>
    <text x="624" y="194" fill="#8b949e">"recovery"</text>
    <text x="726" y="194" fill="#f0f6fc">:</text>
    <text x="745" y="194" fill="#3fb950">"guarded"</text>
  </g>

  <rect x="600" y="244" width="386" height="102" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="624" y="273" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif" font-size="12">WINDOW OWNERSHIP</text>
  <text x="624" y="312" fill="#f0f6fc" font-family="Consolas, monospace" font-size="14">MAIN</text>
  <text x="681" y="312" fill="#3fb950" font-family="Consolas, monospace" font-size="14">MANAGED</text>
  <text x="805" y="312" fill="#8b949e" font-family="Consolas, monospace" font-size="14">TRANSIENT</text>
  <text x="916" y="312" fill="#58a6ff" font-family="Consolas, monospace" font-size="14">NATIVE</text>
</svg>
