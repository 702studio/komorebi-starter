name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Require tag commit on main
        shell: powershell
        run: |
          git merge-base --is-ancestor $env:GITHUB_SHA origin/main
          if ($LASTEXITCODE -ne 0) {
              throw "Release tag must point to a commit reachable from main."
          }

      - name: Install PSScriptAnalyzer
        shell: powershell
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force -Scope CurrentUser
          Install-Module -Name PSScriptAnalyzer -RequiredVersion 1.25.0 -Force -Scope CurrentUser -SkipPublisherCheck

      - name: Validate release source
        shell: powershell
        run: |
          $files = Get-ChildItem -Path . -Filter *.ps1 -Recurse | Where-Object { $_.FullName -notmatch '[\\/]\.reference[\\/]' }
          $results = foreach ($file in $files) {
              Invoke-ScriptAnalyzer -Path $file.FullName -Settings .\PSScriptAnalyzerSettings.psd1
          }
          if ($results) {
              $results | Format-Table
              throw "PSScriptAnalyzer detected linting issues."
          }
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\tests\Test-Repository.ps1

      - name: Build deterministic release package
        shell: powershell
        run: |
          $releaseRoot = Join-Path $env:RUNNER_TEMP 'komorebi-starter-release'
          New-Item -ItemType Directory -Path $releaseRoot -Force | Out-Null
          .\scripts\New-ReleasePackage.ps1 -RepositoryRoot . -OutputRoot $releaseRoot

      - name: Install pinned Inno Setup compiler
        shell: powershell
        run: |
          .\scripts\Install-InnoSetup.ps1 | Out-Null

      - name: Build installer and WinGet manifests
        shell: powershell
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $version = $env:RELEASE_TAG -replace '^v', ''
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
              throw "Release tag must be vMAJOR.MINOR.PATCH: $env:RELEASE_TAG"
          }

          $releaseRoot = Join-Path $env:RUNNER_TEMP 'komorebi-starter-release'
          $installerHash = .\scripts\New-Installer.ps1 -Version $version -RepositoryRoot . -OutputRoot $releaseRoot
          $wingetRoot = Join-Path $env:RUNNER_TEMP 'komorebi-starter-winget'
          $manifestDir = .\scripts\New-WinGetManifests.ps1 -Version $version -InstallerSha256 $installerHash -OutputRoot $wingetRoot
          winget validate --manifest $manifestDir --disable-interactivity
          if ($LASTEXITCODE -ne 0) {
              throw "WinGet manifest validation failed with exit code $LASTEXITCODE."
          }

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $manifestZip = Join-Path $releaseRoot 'winget-manifests.zip'
          [IO.Compression.ZipFile]::CreateFromDirectory(
              $wingetRoot,
              $manifestZip,
              [IO.Compression.CompressionLevel]::Optimal,
              $false)
          $manifestHash = (Get-FileHash -LiteralPath $manifestZip -Algorithm SHA256).Hash.ToLowerInvariant()
          [IO.File]::WriteAllText(
              (Join-Path $releaseRoot 'winget-manifests.zip.sha256'),
              "$manifestHash *winget-manifests.zip",
              [Text.Encoding]::ASCII)

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: |
            ${{ runner.temp }}/komorebi-starter-release/komorebi-starter.zip
            ${{ runner.temp }}/komorebi-starter-release/komorebi-starter.zip.sha256
            ${{ runner.temp }}/komorebi-starter-release/komorebi-starter-setup.exe
            ${{ runner.temp }}/komorebi-starter-release/komorebi-starter-setup.exe.sha256
            ${{ runner.temp }}/komorebi-starter-release/winget-manifests.zip
            ${{ runner.temp }}/komorebi-starter-release/winget-manifests.zip.sha256

      - name: Create GitHub Release
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          $releaseRoot = Join-Path $env:RUNNER_TEMP 'komorebi-starter-release'
          $zip = Join-Path $releaseRoot 'komorebi-starter.zip'
          $checksum = Join-Path $releaseRoot 'komorebi-starter.zip.sha256'
          $installer = Join-Path $releaseRoot 'komorebi-starter-setup.exe'
          $installerChecksum = Join-Path $releaseRoot 'komorebi-starter-setup.exe.sha256'
          $winget = Join-Path $releaseRoot 'winget-manifests.zip'
          $wingetChecksum = Join-Path $releaseRoot 'winget-manifests.zip.sha256'
          gh release create $env:RELEASE_TAG $zip $checksum $installer $installerChecksum $winget $wingetChecksum --verify-tag --title "Release $env:RELEASE_TAG" --generate-notes
