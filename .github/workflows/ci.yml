name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Validate GitHub Actions workflows
        shell: bash
        run: |
          set -euo pipefail
          version='1.7.12'
          archive="actionlint_${version}_linux_amd64.tar.gz"
          curl --fail --location --silent --show-error \
            --output "$archive" \
            "https://github.com/rhysd/actionlint/releases/download/v${version}/${archive}"
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  ${archive}" | sha256sum --check --strict
          tar --extract --gzip --file "$archive" actionlint
          ./actionlint

  validate:
    needs: workflow-lint
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install PSScriptAnalyzer
        shell: powershell
        run: |
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force -Scope CurrentUser
          Install-Module -Name PSScriptAnalyzer -RequiredVersion 1.25.0 -Force -Scope CurrentUser -SkipPublisherCheck

      - name: Run PSScriptAnalyzer linting
        shell: powershell
        run: |
          $files = Get-ChildItem -Path . -Filter *.ps1 -Recurse | Where-Object { $_.FullName -notmatch '[\\/]\.reference[\\/]' }
          $results = foreach ($file in $files) {
              Invoke-ScriptAnalyzer -Path $file.FullName -Settings .\PSScriptAnalyzerSettings.psd1
          }
          if ($results) {
              $results | Format-Table
              throw "PSScriptAnalyzer detected linting issues."
          }

      - name: Run repository tests
        shell: powershell
        run: |
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\tests\Test-Repository.ps1

      - name: Install pinned Inno Setup compiler
        shell: powershell
        run: |
          .\scripts\Install-InnoSetup.ps1 | Out-Null

      - name: Build installer and validate WinGet manifests
        shell: powershell
        run: |
          $artifactRoot = Join-Path $env:RUNNER_TEMP 'komorebi-starter-installer-test'
          New-Item -ItemType Directory -Path $artifactRoot -Force | Out-Null
          $installerHash = .\scripts\New-Installer.ps1 -Version '0.0.0' -RepositoryRoot . -OutputRoot $artifactRoot
          $manifestRoot = Join-Path $artifactRoot 'winget'
          $manifestDir = .\scripts\New-WinGetManifests.ps1 -Version '0.0.0' -InstallerSha256 $installerHash -OutputRoot $manifestRoot
          winget validate --manifest $manifestDir --disable-interactivity
          if ($LASTEXITCODE -ne 0) {
              throw "WinGet manifest validation failed with exit code $LASTEXITCODE."
          }

      - name: Test deterministic release packaging twice and compare hashes
        shell: powershell
        run: |
          $tempDir1 = Join-Path $env:TEMP "komorebi-pkg-test-1"
          $tempDir2 = Join-Path $env:TEMP "komorebi-pkg-test-2"

          if (Test-Path -LiteralPath $tempDir1) { Remove-Item -LiteralPath $tempDir1 -Recurse -Force }
          if (Test-Path -LiteralPath $tempDir2) { Remove-Item -LiteralPath $tempDir2 -Recurse -Force }

          New-Item -ItemType Directory -Path $tempDir1 -Force | Out-Null
          New-Item -ItemType Directory -Path $tempDir2 -Force | Out-Null

          Write-Host "Running release packaging build 1..."
          $hash1 = .\scripts\New-ReleasePackage.ps1 -RepositoryRoot . -OutputRoot $tempDir1

          Write-Host "Running release packaging build 2..."
          $hash2 = .\scripts\New-ReleasePackage.ps1 -RepositoryRoot . -OutputRoot $tempDir2

          Write-Host "Build 1 Hash: $hash1"
          Write-Host "Build 2 Hash: $hash2"

          if ($hash1 -ne $hash2) {
              throw "Build non-determinism detected! Hashes of two builds from same input differ: '$hash1' vs '$hash2'."
          }

          # Clean up
          Remove-Item -LiteralPath $tempDir1 -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -LiteralPath $tempDir2 -Recurse -Force -ErrorAction SilentlyContinue

          Write-Host "Build determinism test passed successfully!"
